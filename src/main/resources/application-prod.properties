# Production configuration - update at deployment
# DATASOURCE_URL should include currentSchema, e.g. jdbc:postgresql://host:5432/imara?currentSchema=imara_schema
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway - run migrations in imara_schema
spring.flyway.enabled=true
spring.flyway.schemas=imara_schema

# JWT - required at deployment
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
